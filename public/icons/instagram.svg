<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 48 48"
  width="30"
  height="30"
  aria-label="Instagram"
  role="img"
>
  <!-- Outer rounded square -->
  <rect
    x="8"
    y="8"
    width="32"
    height="32"
    rx="8"
    ry="8"
    fill="none"
    stroke="#ffffff"
    stroke-width="2.5"
  />

  <!-- Camera lens -->
  <circle
    cx="24"
    cy="24"
    r="7"
    fill="none"
    stroke="#ffffff"
    stroke-width="2.5"
  />

  <!-- Camera dot -->
  <circle
    cx="32"
    cy="16"
    r="1.8"
    fill="#ffffff"
  />
</svg>
